name: Node - Azure WebApp CD workflow
on:
  workflow_call:
    inputs:
      acr-name:
        description: 'Azure Container Registry name.'
        required: true
        type: string
      shared-rg-name:
        description: 'Shared resource group name.'
        required: true
        type: string
      rg-name:
        description: 'Resource group name.'
        required: true
        type: string
      jobs-container-name:
        description: 'Container App name.'
        required: true
        type: string
      key-vault:
        description: 'Key vault name.'
        required: true
        type: string
      runner:
        description: 'Runner for github action'
        required: false
        type: string
    secrets:
      azure-tenant-id:
        description: ''
        required: true
      azure-client-id:
        description: ''
        required: true
      azure-shared-subscription-id:
        description: ''
        required: true
      azure-subscription-id:
        description: ''
        required: true

jobs:
  build:
    name: Build and deploy
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.azure-tenant-id }}
          client-id: ${{ secrets.azure-client-id }}
          subscription-id: ${{ secrets.azure-shared-subscription-id }}

      - name: Create .env file
        run: |
          ENV_CONFIGURATION=$(jq -r ".\"env-vars\"" azure/config.json)
          echo $ENV_CONFIGURATION
          
          IFS=',' read -r -a ENV_VARS <<< $ENV_CONFIGURATION
          for i in "${ENV_VARS[@]}"; do
            KEY=$(echo $i | cut -f1 -d=)
            SECRET_NAME=$(echo $i | cut -f2 -d=)
            SECRET_VALUE=$(az keyvault secret show --name $SECRET_NAME --vault-name ${{ inputs.key-vault }} --query value -o tsv)
            echo "$KEY=$SECRET_VALUE" >> .env
          done

      - name: Resolve a Docker image
        run: |
          DOCKER_IMAGE_TAG=$(jq -r ".\"docker-image-tag\"" azure/config.json)
          echo $DOCKER_IMAGE_TAG
          echo "DOCKER_IMAGE_TAG=$DOCKER_IMAGE_TAG" >> $GITHUB_ENV

      - name: Login to ACR
        shell: bash
        run: |
          az acr login \
              --name ${{ inputs.acr-name }}  \
              --expose-token

      - name: ACR repository list
        run: az acr repository list -n ${{ inputs.acr-name }}

      - name: Build Docker image
        run: az acr build -r ${{ inputs.acr-name }} -g ${{ inputs.shared-rg-name }} -t ${{ env.DOCKER_IMAGE_TAG }} . --platform linux/amd64

      - name: Change subscription
        run: az account set -s ${{ secrets.azure-subscription-id }}

      - name: Update the ContainerApp
        run: az containerapp update -n ${{ inputs.jobs-container-name }} -g ${{ inputs.rg-name }} --image ${{ inputs.acr-name }}.azurecr.io/${{ env.DOCKER_IMAGE_TAG }}
